<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="../../assets/images/pfp-nine-sided-cookie.png" type="image/png">
    <link rel="stylesheet" href="style.css?v=3">

    <!-- Discord & Open Graph Meta Tags -->
    <meta name="theme-color" content="#8859ff">
    <meta property="og:title" content="Austin Strong - Text Toolkit">
    <meta property="og:description" content="Clean strings, transform casing, and run string encoders instantly.">

    <!-- Critical Loading Screen Styles -->
    <style>
        #astrong-loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #121016;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999;
            opacity: 1;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            visibility: visible;
        }
        #astrong-loading-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }
        .loading-spinner {
            width: 58px;
            height: 58px;
            animation: loading-spin 1.2s linear infinite;
            will-change: transform;
        }
        @keyframes loading-spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

    <!-- Animated cookie shape at top of page -->
    <div class="pfp-wrapper">
        <div class="pfp-icon-content">
            <!-- Align-left icon representing Text Toolkit -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-align-left">
                <line x1="21" y1="6" x2="3" y2="6"></line>
                <line x1="15" y1="12" x2="3" y2="12"></line>
                <line x1="17" y1="18" x2="3" y2="18"></line>
            </svg>
        </div>
    </div>

    <div class="portal-container">
        <!-- Back Arrow -->
        <a href="../" class="back-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-arrow-left">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Utilities
        </a>

        <header class="portal-header">
            <!-- Named portal-title to prevent script.js H1 query overrides -->
            <div class="portal-title">Text Toolkit</div>
        </header>

        <main class="generator-card">
            <!-- Source Input Container -->
            <div class="input-section">
                <div class="control-header">
                    <span class="control-label">Source Text</span>
                    <button id="clear-btn" class="text-action-btn" aria-label="Clear source text">Clear</button>
                </div>
                <textarea id="input-text" placeholder="Type or paste your text here..." aria-label="Source text input"></textarea>
            </div>

            <!-- Operations / Actions Grid -->
            <div class="operations-section">
                <span class="control-label">Case Transformations</span>
                <div class="actions-grid">
                    <button class="action-btn" data-action="camel">camelCase</button>
                    <button class="action-btn" data-action="snake">snake_case</button>
                    <button class="action-btn" data-action="pascal">PascalCase</button>
                    <button class="action-btn" data-action="kebab">kebab-case</button>
                    <button class="action-btn" data-action="upper">UPPERCASE</button>
                    <button class="action-btn" data-action="lower">lowercase</button>
                    <button class="action-btn" data-action="title">Title Case</button>
                </div>

                <span class="control-label" style="margin-top: 1rem;">Encoding & Formatting</span>
                <div class="actions-grid">
                    <button class="action-btn" data-action="url-encode">URL Encode</button>
                    <button class="action-btn" data-action="url-decode">URL Decode</button>
                    <button class="action-btn" data-action="base64-encode">Base64 Encode</button>
                    <button class="action-btn" data-action="base64-decode">Base64 Decode</button>
                    <button class="action-btn" data-action="html-escape">HTML Escape</button>
                    <button class="action-btn" data-action="html-unescape">HTML Unescape</button>
                </div>
            </div>

            <!-- Output Container -->
            <div class="output-section">
                <div class="control-header">
                    <span class="control-label">Output Text</span>
                    <button id="copy-btn" class="text-action-btn" aria-label="Copy output text to clipboard">Copy</button>
                </div>
                <div class="output-wrapper">
                    <textarea id="output-text" readonly placeholder="Output will appear here..." aria-label="Output text"></textarea>
                </div>
            </div>

            <!-- Real-time Statistics Panel -->
            <div class="stats-panel">
                <div class="stat-item">
                    <span class="stat-val" id="stat-chars">0</span>
                    <span class="stat-lbl">Characters</span>
                </div>
                <div class="stat-item">
                    <span class="stat-val" id="stat-words">0</span>
                    <span class="stat-lbl">Words</span>
                </div>
                <div class="stat-item">
                    <span class="stat-val" id="stat-lines">0</span>
                    <span class="stat-lbl">Lines</span>
                </div>
                <div class="stat-item">
                    <span class="stat-val" id="stat-time">&lt; 1m</span>
                    <span class="stat-lbl">Read Time</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notification for click-to-copy -->
    <div id="toast" class="toast-popup" aria-live="polite">Copied to clipboard!</div>

    <!-- Scripts: universal console indicator, and script.js for cookie shapes animations -->
    <script src="../../universal.js" defer></script>
    <script src="../script.js" defer></script>
    <script src="script.js" defer></script>
</body>

</html>
